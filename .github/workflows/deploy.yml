name: Hostinger Zero-Manual Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify build output
        run: |
          echo "Frontend build contents"
          ls -la frontend/dist
          echo "Asset files"
          ls -la frontend/dist/assets

      - name: Deploy frontend root files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: frontend/dist/
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/assets/**
            **/.git*
            **/.git*/**

      - name: Deploy frontend assets (force refresh)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: frontend/dist/assets/
          server-dir: /assets/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**

      - name: Deploy backend API to public_html/api
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: backend-php/
          server-dir: /api/
          dangerous-clean-slate: false
          exclude: |
            **/.env
            **/.git*
            **/.git*/**
            **/uploads/**
