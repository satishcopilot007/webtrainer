version: '3.9'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l warning --concurrency=4
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l warning
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/var/www/static
      - media_data:/var/www/media
      - ./nginx/ssl:/etc/nginx/ssl
      - frontend_build:/var/www/frontend
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  static_data:
  media_data:
  frontend_build:
