name: Hostinger Zero-Manual Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare Hostinger deploy package
        run: |
          rm -rf deploy-hostinger
          mkdir -p deploy-hostinger/api
          cp -R frontend/dist/. deploy-hostinger/
          cp -R backend-php/. deploy-hostinger/api/
          rm -f deploy-hostinger/api/.env
          rm -f deploy-hostinger/api/.env.example
          rm -f deploy-hostinger/api/README.md
          rm -f deploy-hostinger/api/database.sql
          rm -f deploy-hostinger/api/courses_insert.sql

            DEPLOY_CLEANUP_TOKEN=$(openssl rand -hex 32)
            echo "DEPLOY_CLEANUP_TOKEN=$DEPLOY_CLEANUP_TOKEN" >> "$GITHUB_ENV"
            cat > deploy-hostinger/.deployment-cleanup.php <<'PHP'
            <?php
            declare(strict_types=1);

            if (!hash_equals('__DEPLOY_CLEANUP_TOKEN__', $_GET['token'] ?? '')) {
              http_response_code(403);
              exit('Forbidden');
            }

            function removePath(string $path): void
            {
              if (is_link($path) || is_file($path)) {
                unlink($path);
                return;
              }

              if (!is_dir($path)) {
                return;
              }

              foreach (scandir($path) ?: [] as $entry) {
                if ($entry === '.' || $entry === '..') {
                  continue;
                }
                removePath($path . DIRECTORY_SEPARATOR . $entry);
              }
              rmdir($path);
            }

            $preserve = array_fill_keys([
              '.deployment-cleanup.php',
              '.htaccess',
              '.well-known',
              'api',
              'assets',
              'index.html',
              'robots.txt',
              'sitemap.xml',
              'uploads',
            ], true);
            $removed = [];

            foreach (scandir(__DIR__) ?: [] as $entry) {
              if ($entry === '.' || $entry === '..' || isset($preserve[$entry])) {
                continue;
              }
              if (str_starts_with($entry, '.ftp-deploy-')) {
                continue;
              }

              removePath(__DIR__ . DIRECTORY_SEPARATOR . $entry);
              $removed[] = $entry;
            }

            header('Content-Type: application/json');
            echo json_encode(['removed' => $removed], JSON_THROW_ON_ERROR);
            unlink(__FILE__);
            PHP
            sed -i "s/__DEPLOY_CLEANUP_TOKEN__/$DEPLOY_CLEANUP_TOKEN/" deploy-hostinger/.deployment-cleanup.php

      - name: Verify deploy package
        run: |
          test -f deploy-hostinger/index.html
          test -d deploy-hostinger/assets
          test -f deploy-hostinger/.htaccess
          test -f deploy-hostinger/api/index.php
          echo "Top-level deploy files"
          find deploy-hostinger -maxdepth 1 -mindepth 1 -printf '%f\n' | sort
          echo "API deploy files"
          find deploy-hostinger/api -maxdepth 2 -type f -printf '%P\n' | sort

      - name: Deploy clean package to Hostinger domain root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 600000
          log-level: standard
          local-dir: deploy-hostinger/
          server-dir: /domains/trainermentors.com/public_html/
          state-name: .ftp-deploy-domain-root-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**

      - name: Remove non-production server files
        run: |
          curl --fail-with-body --show-error --silent \
            --get \
            --data-urlencode "token=$DEPLOY_CLEANUP_TOKEN" \
            https://trainermentors.com/.deployment-cleanup.php

      - name: Verify live deployment
        run: |
          MAIN_ASSET=$(grep -oE '/assets/[^" ]+\.js' deploy-hostinger/index.html | head -n 1)
          test -n "$MAIN_ASSET"
          curl --fail --show-error --retry 5 --retry-all-errors --retry-delay 5 https://trainermentors.com/
          curl --fail --show-error --retry 5 --retry-all-errors --retry-delay 5 "https://trainermentors.com${MAIN_ASSET}"
