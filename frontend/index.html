<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg?v=2" />
    <link rel="shortcut icon" href="/favicon.svg?v=2" />
    <meta name="theme-color" content="#6d28d9" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>TrainerMentors - Best Online Training & Mentorship Platform | Expert Trainers & Mentors</title>
    <meta name="description" content="TrainerMentors offers 900+ expert-led training courses in AI, Cloud, Programming, SAP, Data Science & more. Get 1:1 mentorship from certified trainers and mentors. Online & classroom training with placement assistance." />
    <meta name="keywords" content="trainer, mentor, training, mentors, trainers, online training, corporate training, IT training, TrainerMentors, trainer mentors, best training institute, training courses, mentorship programs, tech training, AI training, cloud training, programming courses, SAP training, data science training, placement training" />
    <meta name="author" content="TrainerMentors" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://trainermentors.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trainermentors.com/" />
    <meta property="og:title" content="TrainerMentors - Best Online Training & Mentorship Platform" />
    <meta property="og:description" content="900+ expert-led training courses with 1:1 mentorship. AI, Cloud, Programming, SAP & more. Join thousands of successful learners." />
    <meta property="og:site_name" content="TrainerMentors" />
    <meta property="og:locale" content="en_IN" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TrainerMentors - Best Online Training & Mentorship Platform" />
    <meta name="twitter:description" content="900+ expert-led training courses with 1:1 mentorship. AI, Cloud, Programming, SAP & more." />
    
    <!-- Additional SEO -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="3 days" />
    <meta name="rating" content="general" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "TrainerMentors",
      "alternateName": ["Trainer Mentors", "TrainerMentor"],
      "url": "https://trainermentors.com",
      "description": "TrainerMentors is India's leading online training and mentorship platform offering 900+ courses in AI, Cloud, Programming, SAP, Data Science with expert trainers and mentors.",
      "foundingDate": "2024",
      "areaServed": {
        "@type": "Country",
        "name": "India"
      },
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contact@trainermentors.com",
        "contactType": "customer service"
      },
      "offers": {
        "@type": "AggregateOffer",
        "offerCount": "900+",
        "priceCurrency": "INR",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TrainerMentors",
      "url": "https://trainermentors.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://trainermentors.com/courses?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <div id="root"></div>
    <!-- Razorpay Payment Gateway -->
    <script async src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
